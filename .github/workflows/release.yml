# SPDX-License-Identifier: GPL-3.0-or-later
#
# Release pipeline for the VietIME Suite.
#
# Fires on tags matching `v*` (e.g. `v0.1.0`, `v0.1.0-installer`).
# Produces per release:
#
#   1. `vietime-doctor-<ver>-<target>.tar.gz`       (x86_64 + aarch64)
#   2. `vietime-installer-<ver>-<target>.tar.gz`    (x86_64 + aarch64)
#   3. `vietime-bench-<ver>-<target>.tar.gz`        (x86_64 + aarch64)
#   4. `vietime-doctor_<ver>_amd64.deb`             (cargo-deb)
#   5. `vietime-installer_<ver>_amd64.deb`          (cargo-deb, INS-71)
#   6. `vietime-bench_<ver>_amd64.deb`              (cargo-deb)
#   7. Attached to a GitHub Release with the changelog fragment for that
#      version auto-extracted from CHANGELOG.md.
#
# Each doctor tarball contains: vietime-doctor binary, README.md,
# CHECKS.md, GLOSSARY.md, CHANGELOG.md, LICENSE.
# Each installer tarball contains: vietime-installer binary,
# installer.md (en + vi), CHANGELOG.md, LICENSE. These are what the AUR
# -bin PKGBUILDs consume.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (without leading v)'
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build doctor
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --locked --target ${{ matrix.target }} -p vietime-doctor
          else
            cargo build --release --locked --target ${{ matrix.target }} -p vietime-doctor
          fi

      - name: Build installer
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --locked --target ${{ matrix.target }} -p vietime-installer
          else
            cargo build --release --locked --target ${{ matrix.target }} -p vietime-installer
          fi

      - name: Build bench
        run: |
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            cross build --release --locked --target ${{ matrix.target }} -p vietime-bench
          else
            cargo build --release --locked --target ${{ matrix.target }} -p vietime-bench
          fi

      - name: Verify binary size (<8 MiB each)
        run: |
          for bin in vietime-doctor vietime-installer vietime-bench; do
            path="target/${{ matrix.target }}/release/${bin}"
            size=$(stat -c%s "$path")
            printf '%s size: %d bytes (%.2f MiB)\n' "$bin" "$size" "$(echo "$size / 1048576" | bc -l)"
            if (( size > 8 * 1024 * 1024 )); then
              echo "::error::${bin} exceeds 8 MiB budget"; exit 1
            fi
          done

      - name: Stage doctor tarball
        run: |
          stage="vietime-doctor-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp target/${{ matrix.target }}/release/vietime-doctor "$stage/"
          cp docs/user/en/README.md       "$stage/README.md"
          cp docs/user/en/CHECKS.md       "$stage/CHECKS.md"
          cp docs/user/en/GLOSSARY.md     "$stage/GLOSSARY.md"
          cp CHANGELOG.md                 "$stage/CHANGELOG.md"
          cp LICENSE                      "$stage/LICENSE"
          tar -czf "${stage}.tar.gz" "$stage"
          sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - name: Stage installer tarball
        run: |
          stage="vietime-installer-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp target/${{ matrix.target }}/release/vietime-installer "$stage/"
          cp docs/user/en/installer.md    "$stage/README.md"
          cp docs/user/vi/installer.md    "$stage/README.vi.md"
          cp CHANGELOG.md                 "$stage/CHANGELOG.md"
          cp LICENSE                      "$stage/LICENSE"
          tar -czf "${stage}.tar.gz" "$stage"
          sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - name: Stage bench tarball
        run: |
          stage="vietime-bench-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp target/${{ matrix.target }}/release/vietime-bench "$stage/"
          cp docs/user/en/bench.md        "$stage/README.md"
          cp docs/user/vi/bench.md        "$stage/README.vi.md"
          cp CHANGELOG.md                 "$stage/CHANGELOG.md"
          cp LICENSE                      "$stage/LICENSE"
          tar -czf "${stage}.tar.gz" "$stage"
          sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - name: Upload tarball artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: |
            vietime-doctor-*.tar.gz
            vietime-doctor-*.tar.gz.sha256
            vietime-installer-*.tar.gz
            vietime-installer-*.tar.gz.sha256
            vietime-bench-*.tar.gz
            vietime-bench-*.tar.gz.sha256

  build-deb:
    name: build (.deb, amd64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build doctor Debian package
        run: cargo deb -p vietime-doctor --locked --no-strip
      - name: Build installer Debian package
        run: cargo deb -p vietime-installer --locked --no-strip
      - name: Build bench Debian package
        run: cargo deb -p vietime-bench --locked --no-strip
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debian-amd64
          path: target/debian/*.deb

  publish:
    name: publish release
    needs: [build-linux, build-deb]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name '*.deb' \) -exec cp {} dist/ \;
          ls -lah dist/

      - name: Extract changelog fragment
        id: changelog
        run: |
          v="${{ steps.ver.outputs.version }}"
          awk -v ver="$v" '
            $0 ~ "^## \\[" ver "\\]" { on = 1; next }
            on && /^## \[/          { exit }
            on                      { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "## ${v}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md)." >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: VietIME Suite ${{ steps.ver.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.deb
