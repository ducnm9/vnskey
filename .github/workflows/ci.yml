name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

# Cancel superseded runs on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Tier-1 gates from docs/dev/process.md §2.
  # Fast feedback on every PR. Must pass to merge.
  # ---------------------------------------------------------------------
  fmt:
    name: cargo fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked

  # ---------------------------------------------------------------------
  # Week-7 DOC-60 — distro matrix for Doctor integration.
  # Fedora / Arch / Debian / openSUSE images run `vietime-doctor report
  # --json` and validate against `schemas/report.v1.json`. We exercise
  # only the subcommands that don't need a live DBus session (the GH
  # runners inherit a stripped-down environment).
  # ---------------------------------------------------------------------
  distro-matrix:
    name: distro integration (${{ matrix.container }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: fedora:40
            setup: dnf -y install gcc openssl-devel python3-pip ibus fcitx5
          - container: archlinux:latest
            setup: pacman -Syu --noconfirm gcc openssl python-pip ibus fcitx5
          - container: debian:12
            setup: apt-get update && apt-get -y install build-essential pkg-config libssl-dev python3-pip ibus fcitx5
          - container: opensuse/tumbleweed:latest
            setup: zypper --non-interactive install gcc openssl-devel python3-pip ibus fcitx5
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
      - name: Distro packages
        run: ${{ matrix.setup }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: distro-${{ matrix.container }}
      - run: cargo build --workspace --locked
      - run: cargo test --workspace --locked
      - name: Smoke: `vietime-doctor report --json` validates against v1 schema
        run: |
          pip3 install --break-system-packages check-jsonschema || pip3 install check-jsonschema
          ./target/debug/vietime-doctor report --json > /tmp/report.json || true
          check-jsonschema --schemafile schemas/report.v1.json /tmp/report.json

  schema:
    name: JSON schema validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install check-jsonschema
        run: pip3 install check-jsonschema
      - name: Validate schema self-consistency
        run: check-jsonschema --check-metaschema schemas/report.v1.json

  deny:
    name: cargo deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  spdx:
    name: SPDX headers
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-spdx.sh

  typos:
    name: typos
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.45.1
        with:
          config: .github/typos.toml
