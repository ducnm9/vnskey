# SPDX-License-Identifier: GPL-3.0-or-later
#
# Flatpak manifest for `vietime-doctor`.
#
# The Doctor is a read-only diagnostic tool, so the sandbox is kept
# deliberately tight:
#
#   * `--filesystem=home:ro`   — let the Doctor read `~/.profile`,
#                                `~/.config/**`, `~/.bashrc`, etc.
#   * `--filesystem=/etc:ro`   — read `/etc/environment`, `/etc/profile.d`
#                                and `/etc/os-release` (host mount via
#                                Flatpak's `/run/host` indirection).
#   * `--filesystem=/proc:ro`  — inspect running daemons (IBus, Fcitx5)
#                                and Electron/Chromium command lines.
#   * `--socket=session-bus`   — talk to `org.freedesktop.IBus` and the
#                                Fcitx5 controller for live engine lists.
#
# We do NOT grant `--talk-name=org.freedesktop.portal.*` blanket access:
# the Doctor reports on portal presence but never invokes them.
#
# To produce `cargo-sources.json`, run (outside Flatpak):
#
#   pip install --user toml requests
#   python3 tools/flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json
#
# (Upstream: https://github.com/flatpak/flatpak-builder-tools)
#
# This manifest is published to Flathub post-0.1.0 tag. Local builds:
#
#   flatpak-builder --user --install --force-clean build-dir \
#       packaging/flatpak/io.vietime.Doctor.yml
#   flatpak run io.vietime.Doctor report

app-id: io.vietime.Doctor
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: vietime-doctor

# Diagnostic-only tool — no write access, no network, no GPU.
finish-args:
  - --filesystem=home:ro
  - --filesystem=/etc:ro
  - --filesystem=/proc:ro
  - --socket=session-bus
  - --share=ipc

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    # `--offline` because `cargo-sources.json` vendors everything. No
    # network in the Flatpak build sandbox by design.
    - --share=network
  env:
    CARGO_HOME: /run/build/vietime-doctor/cargo
    RUSTFLAGS: '-C link-arg=-Wl,-z,relro,-z,now'

modules:
  - name: vietime-doctor
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --locked
      - cargo --offline build --release --locked -p vietime-doctor
      - install -Dm755 target/release/vietime-doctor /app/bin/vietime-doctor
      - install -Dm644 docs/user/en/README.md /app/share/doc/vietime-doctor/README.md
      - install -Dm644 docs/user/en/CHECKS.md /app/share/doc/vietime-doctor/CHECKS.md
      - install -Dm644 docs/user/en/GLOSSARY.md /app/share/doc/vietime-doctor/GLOSSARY.md
      - install -Dm644 docs/user/vi/README.md /app/share/doc/vietime-doctor/README.vi.md
      - install -Dm644 CHANGELOG.md /app/share/doc/vietime-doctor/CHANGELOG.md
      - install -Dm644 LICENSE /app/share/licenses/vietime-doctor/LICENSE
      - install -Dm644 assets/io.vietime.VNSKey.desktop /app/share/applications/io.vietime.VNSKey.desktop
      - install -Dm644 assets/io.vietime.VNSKey.metainfo.xml /app/share/metainfo/io.vietime.VNSKey.metainfo.xml
      - |
        for size in 16 24 32 48 64 128 256 512; do
          install -Dm644 "assets/icons/hicolor/${size}x${size}/apps/vnskey.png" \
            "/app/share/icons/hicolor/${size}x${size}/apps/vnskey.png"
        done
    sources:
      # NOTE: `type: dir` with `path: ../..` is the local-build form.
      # For Flathub publishing this is replaced with a `type: archive`
      # entry pointing at the tagged GitHub Release tarball plus its
      # sha256 checksum.
      - type: dir
        path: ../..
      # Auto-generated by `flatpak-cargo-generator.py Cargo.lock`.
      # Regenerate whenever Cargo.lock changes. Keeping the file in-tree
      # (rather than as a module source URL) means reviewers can diff
      # transitive-dep changes against each release.
      - cargo-sources.json
